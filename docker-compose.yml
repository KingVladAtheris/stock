version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: accounting-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: accounting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: